<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Admin</title>
  <style>
    body {
      background: #03060b;
      color: white;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      height: 100vh;
    }

    form {
      background: #07101c;
      padding: 35px;
      border-radius: 18px;
      width: 330px;
      border: 1px solid #222;
    }

    h1 {
      color: #ff2d2d;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #25d366;
      font-weight: bold;
      cursor: pointer;
    }

    .error {
      color: #ff4d4d;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<form method="POST">
  <h1>Admin</h1>

  <input type="text" name="usuario" placeholder="Usuario" required>
  <input type="password" name="password" placeholder="Contraseña" required>

  <button type="submit">Entrar</button>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
</form>

</body>
</html>
